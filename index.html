<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 21st Birthday!</title>
    <style>
        /* 欢迎页面 */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        .welcome-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .welcome-text {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #87ceeb;
            margin-bottom: 30px;
            animation: pulse 2s ease infinite;
        }

        .welcome-hint {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            animation: fadeInOut 2s ease infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .welcome-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            color: white;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 流星 */
        .meteor {
            position: fixed;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, transparent, white, transparent);
            animation: meteor 3s linear infinite;
            z-index: 1;
        }

        @keyframes meteor {
            0% { transform: translateY(-100px) rotate(45deg); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(45deg); opacity: 0; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 标题 */
        .title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 300;
            text-align: center;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards 0.5s;
        }

        .title span {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff69b4, #87ceeb, #ffd700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 副标题 */
        .subtitle {
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: #87ceeb;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards 1s;
        }

        /* 祝福语 */
        .message {
            max-width: 600px;
            text-align: center;
            font-size: clamp(1rem, 3vw, 1.3rem);
            line-height: 2;
            color: #e0e0ff;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .message .typing-text {
            border-right: 2px solid #87ceeb;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* 照片展示 */
        .photos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            width: 100%;
            max-width: 800px;
        }

        .photo-frame {
            position: relative;
            width: 280px;
            height: 350px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(135, 206, 235, 0.3);
            opacity: 0;
            transform: scale(0.8);
            animation: photoAppear 1s ease forwards;
        }

        .photo-frame:nth-child(1) { animation-delay: 2s; }
        .photo-frame:nth-child(2) { animation-delay: 2.5s; }

        @keyframes photoAppear {
            to { opacity: 1; transform: scale(1); }
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            pointer-events: none;
        }

        /* 照片装饰 */
        .photo-frame::after {
            content: '✨';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            animation: sparkle 1.5s ease infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* 音乐控制按钮 */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .music-btn.playing {
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(135, 206, 235, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(135, 206, 235, 0); }
        }

        /* 粒子特效 */
        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 1.5rem;
            animation: particleFly 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes particleFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* 页脚 */
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            opacity: 0;
            animation: fadeInUp 1s ease forwards 3s;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .photo-frame {
                width: 240px;
                height: 300px;
            }
            .photos {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 欢迎页面 -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-stars" id="welcomeStars"></div>
        <p class="welcome-text">✨ 有一份惊喜等待着你 ✨</p>
        <p class="welcome-hint">点击任意处进入</p>
    </div>

    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 流星 -->
    <div class="meteor" style="left: 20%; animation-delay: 0s;"></div>
    <div class="meteor" style="left: 60%; animation-delay: 1.5s;"></div>
    <div class="meteor" style="left: 80%; animation-delay: 3s;"></div>

    <!-- 音乐控制 -->
    <button class="music-btn" id="musicBtn" title="播放/暂停音乐">
        <span id="musicIcon">🎵</span>
    </button>

    <!-- 主内容 -->
    <div class="container" id="mainContainer">
        <h1 class="title"><span>Happy 21st Birthday!</span></h1>
        <p class="subtitle">愿你的每一天都如星空般璀璨 ✨</p>

        <div class="message">
            <p class="typing-text" id="typingText"></p>
        </div>

        <div class="photos">
            <div class="photo-frame">
                <img src="assets/photo1.jpg" alt="生日照片1" onerror="this.style.display='none'">
            </div>
            <div class="photo-frame">
                <img src="assets/photo2.jpg" alt="生日照片2" onerror="this.style.display='none'">
            </div>
        </div>

        <p class="footer">点击页面任意处，发现惊喜 🎉</p>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto" autoplay>
        <source src="assets/birthday.mp3" type="audio/mpeg">
        <source src="assets/birthday.mp3" type="audio/mp3">
    </audio>

    <script>
        // 创建星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 150;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDuration = Math.random() * 3 + 2 + 's';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 打字机效果
        function typeWriter(text, element, speed = 50) {
            let i = 0;
            element.innerHTML = '';

            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        // 音乐控制
        const musicBtn = document.getElementById('musicBtn');
        const musicIcon = document.getElementById('musicIcon');
        const bgMusic = document.getElementById('bgMusic');
        let isPlaying = false;

        // 音频加载失败提示
        bgMusic.addEventListener('error', (e) => {
            console.error('音频加载失败:', e);
            musicIcon.textContent = '❌';
            setTimeout(() => { musicIcon.textContent = '🎵'; }, 2000);
        });

        // 页面加载时自动播放音乐
        window.addEventListener('load', () => {
            const playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    musicIcon.textContent = '🎶';
                    musicBtn.classList.add('playing');
                }).catch((error) => {
                    console.log('自动播放被浏览器阻止，等待用户点击');
                });
            }
        });

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicIcon.textContent = '🎵';
                musicBtn.classList.remove('playing');
                isPlaying = false;
            } else {
                const playPromise = bgMusic.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        musicIcon.textContent = '🎶';
                        musicBtn.classList.add('playing');
                        isPlaying = true;
                    }).catch((error) => {
                        console.error('播放失败:', error);
                        musicIcon.textContent = '❌';
                        setTimeout(() => { musicIcon.textContent = '🎵'; }, 2000);
                    });
                }
            }
        });

        // 点击粒子特效
        const particles = ['💖', '✨', '🌟', '💫', '⭐', '🎊', '💝'];

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = particles[Math.floor(Math.random() * particles.length)];

            const tx = (Math.random() - 0.5) * 200;
            const ty = (Math.random() - 0.5) * 200 - 100;

            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.setProperty('--ty', ty + 'px');

            document.body.appendChild(particle);

            setTimeout(() => particle.remove(), 1000);
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.music-btn')) {
                createParticle(e.clientX, e.clientY);
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 创建欢迎页面的星星
            const welcomeStars = document.getElementById('welcomeStars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDuration = Math.random() * 3 + 2 + 's';
                welcomeStars.appendChild(star);
            }

            // 欢迎页面点击事件
            const welcomeScreen = document.getElementById('welcomeScreen');
            welcomeScreen.addEventListener('click', () => {
                welcomeScreen.classList.add('hidden');
                // 隐藏后自动播放音乐
                setTimeout(() => {
                    bgMusic.play().then(() => {
                        isPlaying = true;
                        musicIcon.textContent = '🎶';
                        musicBtn.classList.add('playing');
                    }).catch(() => {});
                }, 300);
            });

            createStars();

            const message = "在这个特别的日子里，愿你的未来像星空一样无限广阔，愿你的每一个梦想都能闪耀发光。21岁，是人生最美好的年纪，愿你永远保持热爱，奔赴山海。生日快乐！🎂";
            const typingText = document.getElementById('typingText');

            setTimeout(() => {
                typeWriter(message, typingText, 40);
            }, 1500);
        });
    </script>
</body>
</html>
